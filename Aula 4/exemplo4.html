<!DOCTYPE html> 
<html lang="pt-BR"> 
<head> 
<meta charset="UTF-8"> 
<title>Exemplo Flexbox</title> 
<style> 
body{ 
font-family: Arial, sans-serif; 
} 
/* Container flex */ 
.container{ 
display: flex; 
height: 150px; 
border: 2px solid #333; 
margin: 20px 0; 
padding: 10px; 
gap: 10px; 
} 
/* Itens */ 
.item{ 
background: steelblue; 
color: white; 
padding: 15px; 
font-weight: bold; 
} 
/* ===== FLEX-DIRECTION ===== */ 

 
 
 
.row{ 
    flex-direction: row; 
} 
 
.column{ 
    flex-direction: column; 
} 
 
/* ===== JUSTIFY-CONTENT ===== */ 
 
.center{ 
    justify-content: center; 
} 
 
.space-between{ 
    justify-content: space-between; 
} 
 
.space-around{ 
    justify-content: space-around; 
} 
 
/* ===== ALIGN-ITEMS ===== */ 
 
.align-center{ 
    align-items: center; 
} 
 
.align-end{ 
    align-items: flex-end; 
} 
 
</style> 
</head> 
 
<body> 
<h3>Direção padrão (row)</h3> 
<div class="container row"> 
    <div class="item">1</div> 
    <div class="item">2</div> 
    <div class="item">3</div> 
</div> 
 
<h3>justify-content: space-between</h3> 
<div class="container row space-between"> 
    <div class="item">1</div> 
    <div class="item">2</div> 
    <div class="item">3</div> 
</div> 

<h3>align-items: center</h3> 
<div class="container row align-center"> 
<div class="item">1</div> 
<div class="item">2</div> 
<div class="item">3</div> 
</div> 
<h3>flex-direction: column</h3> 
<div class="container column align-end"> 
<div class="item">1</div> 
<div class="item">2</div> 
<div class="item">3</div> 
</div> 
</body> 
</html>
