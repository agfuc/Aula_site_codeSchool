<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
initial-scale=1.0">
    <title>Posicionamento</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Exemplo STATIC (padrão do HTML) */
        .static-box {
            position: static;
            background: lightblue;
            padding: 10px;
            margin: 10px 40px;
            top: 20px;
            /* NÃO funciona */
            left: 20px;
            /* NÃO funciona */
            border: 1px solid #4a90e2;
        }

        /* Pai vira referência */
        .container {
            position: relative;
            width: 600px;
            height: 150px;
            background: #eee;
            padding: 20px;
            margin: 40px;
            border: 1px solid #ccc;
        }

        /* Filho flutua em relação ao pai */
        .notificacao {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <h2>Exemplo position: static (padrão)</h2>
    <div class="static-box">
        Elemento static 1 (segue o fluxo normal da página)
    </div>
    <div class="static-box">
        Elemento static 2 (top e left não funcionam)
    </div>
    <h2>Exemplo relative + absolute</h2>
    <div class="container">
        <div class="notificacao">99+</div>
        Mensagens Recebidas
    </div>

</body>

</html>
