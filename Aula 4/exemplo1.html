<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            background-color: cornsilk;
            align-items: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            padding: 50px;

        }

        form {
            background-color: aliceblue;
            width: 300px;
            padding: 20px;
            border: 1px solid #a7a7a7;
            border-radius: 8px;
            box-shadow: 1px 1px 40px 10px rgb(0, 0, 0)
        }

        input {
            width: 100%;
            border-radius: 9px;
            box-sizing: border-box;
            border: 1px double #a7a7a7;
        }

        button {
            width: 100%;
            border: 10px;
            background-color: black;
            border-radius: 6px;
            color: whitesmoke;
            border: none;
            font-weight: bold;
            cursor: help;
        }

        button:hover {
            background-color: rgb(71, 180, 180);
        }

        #resultado {
            background-color: pink;
          
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            resize: horizontal;
        }
    </style>
</head>

<body>

    <h2>Calculadora de IMC</h2>
    <form>

        Peso (kg): <br>
        <input type="number" id="peso" placeholder="Ex: 100.5"> <br><br>
        Altura (m): <br>
        <input type="number" id="altura" placeholder="Ex: 1.93"> <br><br>

        <!-- Usando o elemento <button> moderno -->
        <button type="button" onclick="calcularIMC()">Calcular IMC</button>
    </form>

    <h3 id="resultado"></h3>
    <script>

        function calcularIMC() {
            // Obtendo os valores dos inputs 
            const peso = document.getElementById('peso').value;
            const altura = document.getElementById('altura').value;

            if (peso > 0 && altura > 0) {
                // Cálculo: peso dividido pela altura ao quadrado 
                const imc = peso / (altura * altura);

                // Exibindo o resultado formatado com 2 casas decimais 
                document.getElementById('resultado').innerHTML =
                    "Seu IMC é: " + imc.toFixed(2);
            } else {
                document.getElementById('resultado').innerHTML =
                    "Por favor, insira valores válidos.";
            }
        } 
    </script>
</body>
