<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação</title>
</head>
<body>
    <strong>Este é um texto em negrito</strong><br>
    <em>Este é um texto em Itálico</em><br>

    <mark>Este é um texto Destacado</mark>
    
</body>
</html>
