<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Elementos</title>
</head>

<body>
    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="masc" value="M">
        <label for="masc">Dark Sous II</label> <br>

        <input type="radio" name="sexo" id="fem" value="F">
        <label for="fem">Dark Souls II SOFTS</label> <br>

    </fieldset>
    <fieldset>
        <legend>Melhor jogo da série Souls</legend>
        <input type="checkbox" name="interesses" id="game" value="games">
        <label for="game">Dark Souls II</label> <br>
        <input type="checkbox" name="interesses" id="game" value="games">
        <label for="game">Dark Souls II SOFTS</label><br>
        <input type="checkbox" name="interesses" id="game" value="games">
        <label for="game">Dark Souls II 2</label><br>
        <input type="checkbox" name="interesses" id="game" value="games">
        <label for="game">Dark Souls II 2.2</label><br>
    </fieldset>
    <fieldset>
        <p>
            <label for="souls">Selecione o melhor Souls:</label>
            <select name="souls" id="souls">
                <option value="">Selecione...</option>
                <option value="DS2">Dark Souls II</option>
                <option value="DS2">Dark Souls II SOFTS</option>
                <option value="DS2">Dark Souls II 2</option>
                <option value="DS2">Dark Souls II 2.2</option>
            </select>
        </p>
    </fieldset>
</body>

</html>
