<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular IMC</title>
</head>

<body>
    <header>
        <h2>Calucadora de IMC</h2>
    </header>
    <main>
        <form>
            <label for="peso">Peso(kg)</label>
            <input type="number" id="peso" placeholder="Ex: 99.8"> <br><br>

            <label for="altura">Altura(m)</label>
            <input type="number" id="altura" placeholder="Ex: 1.91"> <br><br>

            <button type="button" onclick="calcularIMC()">Calcular IMC</button>

            <h3 id="resultado"></h3>
        </form>
    </main>
    <script>
    function calcularIMC() {
        /* Obter valores dos inputs */
        const peso = document.getElementById('peso').value;
        const altura = document.getElementById('altura').value;
        if (peso > 0 && altura > 0){
            const imc = peso / (altura * altura);
            document.getElementById('resultado').innerHTML = "Seu IMC é: "+imc.toFixed(0);
        }else
        {
          document.getElementById('resultado').innerHTML = "Digite valores válidos";  
        }
    }
</script>
</body>
</html>
