<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>

<body>
    <h2>Produtos</h2>
    <table border="2">
        <tr>
            <th>Código</th>
            <th>Protudo</th>
            <th>Preço</th>
        </tr>
        <td>001</td>
        <td>Lasanha</td>
        <td>19,99</td>
        <tr>
            <td>002</td>
            <td>Pizza</td>
            <td>21,50</td>
        </tr>
        <tr>
            <td>003</td>
            <td>Calzone</td>
            <td>24,12</td>
        </tr>
        <tr>
            <td rowspan="2">Desconto</td>
            <td colspan="2">Cupom IFSC = R$10,00</td>
        </tr>
        <tr>
            <td colspan="2">Cupom ADS - R$120,00</td>
        </tr>
        <tr>
            <td>Total</td>
            <td colspan="2">-R$65,39</td>
        </tr>

        <input type="password">
        <input type="email">
        <input type="checkbox">
        <button>Enviar</button>
    </table>
</body>

</html>
