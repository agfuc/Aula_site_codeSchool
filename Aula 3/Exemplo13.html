!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Calculadora de IMC</title> 
</head> 
<body> 
    <h2>Calculadora de IMC</h2> 
    <form> 
        Peso (kg): <br> 
        <input type="number" id="peso" placeholder="Ex: 70.5"> <br><br> 
 
        Altura (m): <br> 
        <input type="number" id="altura" placeholder="Ex: 1.75"> <br><br> 
 
        <!-- Usando o elemento <button> moderno --> 
        <button type="button" onclick="calcularIMC()">Calcular IMC</button> 
    </form> 
 
    <h3 id="resultado"></h3> 
 
    <script> 
        function calcularIMC() { 
            // Obtendo os valores dos inputs 
            const peso = document.getElementById('peso').value; 
            const altura = document.getElementById('altura').value; 
            
            if (peso > 0 && altura > 0) { 
                // Cálculo: peso dividido pela altura ao quadrado 
                const imc = peso / (altura * altura); 
                
                // Exibindo o resultado formatado com 2 casas decimais 
                document.getElementById('resultado').innerHTML = 
                    "Seu IMC é: " + imc.toFixed(2); 
            } else { 
                document.getElementById('resultado').innerHTML = 
                    "Por favor, insira valores válidos."; 
            } 
        } 
    </script> 
</body> 
</html>
