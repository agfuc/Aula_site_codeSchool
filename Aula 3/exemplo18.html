<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Div e Span </title>
    <style>
        #topo{
            background-color: green;
            margin: 0px;
        }
        #menu{
            background-color: gray;
        }
    </style>
</head>
<body>
    <header>
        <div id="topo">
            <img src="logo ifsc.png" width="200"> <br>
    
        </div>
    </header>
    <nav>
        <div id="menu">
            <span>Home |</span>
            <span>Produtos |</span>
            <Span>Contatos</Span>
        </div>
    </nav>
</body>
</html>
