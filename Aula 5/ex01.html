<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid CSS</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }

        body{
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
        .grid-exemplo{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 80px 700px 80px;
            gap: 10px;
            max-width: 1024px ;
            margin: 20px auto;
        }
        .header{
            grid-column: 1/4;
            background: #1abc9c;
        }
        .menu{
            grid-column: 1/2;
            background: #3198db;
        }
        .conteudo{
            grid-column: 2/4;
            background: #9db561;
        }
        .footer{
            grid-column: 3/4;
            background: #999;
        }
        .bloco{
            display: flex;
            justify-content: center;
            color: white;
            font-weight: bold;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="grid-exemplo">
        <div class="header">Cabeçalho</div>
        <div class="menu">Menu</div>
        <div class="conteudo">Conteúdo</div>
        <div class="footer">Rodapé</div>

    </div>
</body>
</html>
